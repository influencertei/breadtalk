<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의하기 | 빵톡</title>
  <meta name="description" content="빵톡에 제휴, 협업, 클래스 문의를 남겨주세요." />

  <style>
    :root {
      --bg: #fffaf3;
      --surface: #ffffff;
      --surface-soft: #f7f1e7;
      --text: #333333;
      --muted: #6b675f;
      --primary: #8a6240;
      --primary-dark: #6f4f34;
      --accent: #8e9b62;
      --border: #e7dccd;
      --shadow: 0 10px 25px rgba(88, 67, 46, 0.08);
      --radius-lg: 22px;
      --max-width: 1180px;
    }

    [data-theme="dark"] {
      --bg: #1a1612;
      --surface: #242018;
      --surface-soft: #2c2720;
      --text: #e8e0d4;
      --muted: #a09484;
      --primary: #c59b74;
      --primary-dark: #d4a97e;
      --accent: #a3b576;
      --border: #3d3529;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.75;
      word-break: keep-all;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }

    .container {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 76px;
      gap: 16px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      color: var(--primary-dark);
      font-size: 1.25rem;
    }

    .logo-badge {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #c59b74, #8a6240);
      color: #fff;
      font-weight: 800;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 700;
      transition: 0.2s ease;
    }

    .nav a:hover, .nav a.active {
      background: #f2e8db;
      color: var(--primary-dark);
    }

    [data-theme="dark"] .nav a:hover,
    [data-theme="dark"] .nav a.active {
      background: var(--surface-soft);
    }

    .nav-toggle {
      display: none;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--surface-soft);
      color: var(--primary-dark);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .theme-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--primary-dark);
      font-size: 1.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
      flex-shrink: 0;
    }

    .theme-btn:hover { background: var(--border); }

    /* Page */
    .page-hero {
      padding: 64px 0 40px;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #efe5d7;
      color: var(--primary-dark);
      font-size: 0.95rem;
      font-weight: 700;
    }

    [data-theme="dark"] .eyebrow {
      background: var(--surface-soft);
    }

    .page-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      color: var(--primary-dark);
      margin: 0 0 14px;
      line-height: 1.2;
    }

    .page-desc {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0;
    }

    /* Form wrapper */
    .form-section {
      padding: 0 0 80px;
    }

    .form-wrap {
      max-width: 640px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 8px;
      font-size: 0.97rem;
    }

    label span {
      color: #c0392b;
      margin-left: 2px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(138, 98, 64, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    .submit-btn {
      width: 100%;
      min-height: 56px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      font-size: 1.05rem;
      box-shadow: var(--shadow);
      transition: 0.2s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Success message */
    .success-msg {
      display: none;
      text-align: center;
      padding: 32px 20px;
    }

    .success-msg .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .success-msg h3 {
      font-size: 1.5rem;
      color: var(--primary-dark);
      margin: 0 0 10px;
      font-weight: 800;
    }

    .success-msg p {
      color: var(--muted);
      margin: 0;
    }

    /* Info boxes */
    .info-grid {
      max-width: 640px;
      margin: 32px auto 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .info-box {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
    }

    .info-box .icon { font-size: 1.6rem; margin-bottom: 8px; }
    .info-box strong { display: block; color: var(--primary-dark); font-size: 0.95rem; margin-bottom: 4px; }
    .info-box span { color: var(--muted); font-size: 0.88rem; }

    /* Footer */
    .site-footer {
      padding: 36px 0 48px;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-copy { color: var(--muted); font-size: 0.92rem; }

    .footer-links {
      display: flex;
      gap: 14px;
    }

    .footer-links a {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .footer-links a:hover { color: var(--primary-dark); }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-toggle { display: inline-grid; place-items: center; }

      .nav {
        position: absolute;
        top: 76px;
        left: 16px;
        right: 16px;
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 14px;
        border-radius: 20px;
        box-shadow: var(--shadow);
      }

      .nav.open { display: flex; }
      .nav a { padding: 12px 14px; }

      .form-wrap { padding: 28px 20px; }

      .info-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .container { width: min(100% - 24px, var(--max-width)); }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="빵톡 홈으로 이동">
        <span class="logo-badge">빵</span>
        <span>빵톡</span>
      </a>

      <div style="display:flex;align-items:center;gap:8px;">
        <button class="theme-btn" id="themeBtn" aria-label="다크/라이트 모드 전환">🌙</button>
        <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기" aria-expanded="false">☰</button>
      </div>

      <nav class="nav" id="mainNav" aria-label="주 메뉴">
        <a href="index.html">홈</a>
        <a href="recipes.html">레시피</a>
        <a href="recommend.html">추천 재료</a>
        <a href="about.html">소개</a>
        <a href="contact.html" class="active">문의</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-hero">
      <div class="container">
        <span class="eyebrow">제휴 · 협업 · 클래스 문의</span>
        <h1 class="page-title">빵톡에 문의하기</h1>
        <p class="page-desc">제휴, 협업, 클래스 관련 문의를 남겨주시면 빠르게 답변드리겠습니다.</p>
      </div>
    </div>

    <section class="form-section">
      <div class="container">
        <div class="form-wrap">
          <form id="contactForm" action="https://formspree.io/f/xeerwjao" method="POST">
            <div class="form-group">
              <label for="name">이름 <span>*</span></label>
              <input type="text" id="name" name="name" placeholder="홍길동" required />
            </div>

            <div class="form-group">
              <label for="email">이메일 <span>*</span></label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required />
            </div>

            <div class="form-group">
              <label for="type">문의 유형 <span>*</span></label>
              <select id="type" name="type" required>
                <option value="" disabled selected>문의 유형을 선택해주세요</option>
                <option value="제휴·광고">제휴 · 광고</option>
                <option value="협업">콘텐츠 협업</option>
                <option value="클래스">클래스 · 강의 문의</option>
                <option value="전자책">전자책 알림 신청</option>
                <option value="기타">기타</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">문의 내용 <span>*</span></label>
              <textarea id="message" name="message" placeholder="문의하실 내용을 자유롭게 적어주세요." required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">문의 보내기</button>
          </form>

          <div class="success-msg" id="successMsg">
            <div class="icon">🍞</div>
            <h3>문의가 접수되었습니다!</h3>
            <p>빠른 시일 내에 이메일로 답변드리겠습니다.<br />빵톡을 찾아주셔서 감사합니다.</p>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="icon">🤝</div>
            <strong>제휴 · 광고</strong>
            <span>브랜드 협업 및 제품 소개 문의</span>
          </div>
          <div class="info-box">
            <div class="icon">📚</div>
            <strong>클래스 · 전자책</strong>
            <span>온라인 강의 및 자료 출시 알림</span>
          </div>
          <div class="info-box">
            <div class="icon">💬</div>
            <strong>기타 문의</strong>
            <span>레시피 제안 및 기타 협력 문의</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-copy">© 2026 빵톡. All rights reserved.</span>
      <div class="footer-links">
        <a href="index.html">홈</a>
        <a href="recipes.html">레시피</a>
        <a href="contact.html">문의</a>
      </div>
    </div>
  </footer>

  <script>
    // 다크모드
    const themeBtn = document.getElementById("themeBtn");
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
      document.documentElement.setAttribute("data-theme", "dark");
      themeBtn.textContent = "☀️";
    }
    themeBtn.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      if (isDark) {
        document.documentElement.removeAttribute("data-theme");
        themeBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        themeBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      }
    });

    // 모바일 메뉴
    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");
    navToggle.addEventListener("click", () => {
      const isOpen = mainNav.classList.toggle("open");
      navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      navToggle.textContent = isOpen ? "✕" : "☰";
    });

    // Formspree AJAX 제출
    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "전송 중...";

      const res = await fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { Accept: "application/json" },
      });

      if (res.ok) {
        form.style.display = "none";
        successMsg.style.display = "block";
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = "문의 보내기";
        alert("전송에 실패했습니다. 잠시 후 다시 시도해주세요.");
      }
    });
  </script>
</body>
</html>
