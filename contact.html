<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의하기 | 빵톡</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="description" content="빵톡에 제휴, 협업, 클래스 문의를 남겨주세요." />

</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="빵톡 홈으로 이동">
        <span class="logo-badge">빵</span>
        <span>빵톡</span>
      </a>

      <div class="header-controls">
        <button class="theme-btn" id="themeBtn" aria-label="다크/라이트 모드 전환">🌙</button>
        <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기" aria-expanded="false">☰</button>
      </div>

      <nav class="nav" id="mainNav" aria-label="주 메뉴">
        <a href="index.html">홈</a>
        <a href="recipes.html">레시피</a>
        <a href="recommend.html">추천 재료</a>
        <a href="about.html">소개</a>
        <a href="contact.html" class="active">문의</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-hero">
      <div class="container">
        <span class="eyebrow">제휴 · 협업 · 클래스 문의</span>
        <h1 class="page-title">빵톡에 문의하기</h1>
        <p class="page-desc">제휴, 협업, 클래스 관련 문의를 남겨주시면 빠르게 답변드리겠습니다.</p>
      </div>
    </div>

    <section class="form-section">
      <div class="container">
        <div class="form-wrap">
          <form id="contactForm" action="https://formspree.io/f/xeerwjao" method="POST">
            <div class="form-group">
              <label for="name">이름 <span>*</span></label>
              <input type="text" id="name" name="name" placeholder="홍길동" required />
            </div>

            <div class="form-group">
              <label for="email">이메일 <span>*</span></label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required />
            </div>

            <div class="form-group">
              <label for="type">문의 유형 <span>*</span></label>
              <select id="type" name="type" required>
                <option value="" disabled selected>문의 유형을 선택해주세요</option>
                <option value="제휴·광고">제휴 · 광고</option>
                <option value="협업">콘텐츠 협업</option>
                <option value="클래스">클래스 · 강의 문의</option>
                <option value="전자책">전자책 알림 신청</option>
                <option value="기타">기타</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">문의 내용 <span>*</span></label>
              <textarea id="message" name="message" placeholder="문의하실 내용을 자유롭게 적어주세요." required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">문의 보내기</button>
          </form>

          <div class="success-msg" id="successMsg">
            <div class="icon">🍞</div>
            <h3>문의가 접수되었습니다!</h3>
            <p>빠른 시일 내에 이메일로 답변드리겠습니다.<br />빵톡을 찾아주셔서 감사합니다.</p>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="icon">🤝</div>
            <strong>제휴 · 광고</strong>
            <span>브랜드 협업 및 제품 소개 문의</span>
          </div>
          <div class="info-box">
            <div class="icon">📚</div>
            <strong>클래스 · 전자책</strong>
            <span>온라인 강의 및 자료 출시 알림</span>
          </div>
          <div class="info-box">
            <div class="icon">💬</div>
            <strong>기타 문의</strong>
            <span>레시피 제안 및 기타 협력 문의</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-copy">© 2026 빵톡. All rights reserved.</span>
      <div class="footer-links">
        <a href="index.html">홈</a>
        <a href="recipes.html">레시피</a>
        <a href="contact.html">문의</a>
      </div>
    </div>
  </footer>

  <script>
    // 다크모드
    const themeBtn = document.getElementById("themeBtn");
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
      document.documentElement.setAttribute("data-theme", "dark");
      themeBtn.textContent = "☀️";
    }
    themeBtn.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      if (isDark) {
        document.documentElement.removeAttribute("data-theme");
        themeBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        themeBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      }
    });

    // 모바일 메뉴
    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");
    navToggle.addEventListener("click", () => {
      const isOpen = mainNav.classList.toggle("open");
      navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      navToggle.textContent = isOpen ? "✕" : "☰";
    });

    // Formspree AJAX 제출
    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "전송 중...";

      const res = await fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { Accept: "application/json" },
      });

      if (res.ok) {
        form.style.display = "none";
        successMsg.style.display = "block";
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = "문의 보내기";
        alert("전송에 실패했습니다. 잠시 후 다시 시도해주세요.");
      }
    });
  </script>
</body>
</html>
