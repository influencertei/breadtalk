  <button class="top-btn" id="topBtn" aria-label="맨 위로 이동">↑</button>

  <script>
    const themeBtn = document.getElementById("themeBtn");
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
      document.documentElement.setAttribute("data-theme", "dark");
      themeBtn.textContent = "☀️";
    }
    themeBtn.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      if (isDark) { document.documentElement.removeAttribute("data-theme"); themeBtn.textContent = "🌙"; localStorage.setItem("theme", "light"); }
      else { document.documentElement.setAttribute("data-theme", "dark"); themeBtn.textContent = "☀️"; localStorage.setItem("theme", "dark"); }
    });
    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");
    const navBackdrop = document.getElementById("navBackdrop");
    navToggle.addEventListener("click", () => {
      const isOpen = mainNav.classList.toggle("open");
      navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      navToggle.textContent = isOpen ? "✕" : "☰";
      if (navBackdrop) navBackdrop.classList.toggle("show", isOpen);
    });
    if (navBackdrop) {
      navBackdrop.addEventListener("click", () => {
        mainNav.classList.remove("open"); navToggle.setAttribute("aria-expanded", "false"); navToggle.textContent = "☰"; navBackdrop.classList.remove("show");
      });
    }
    const topBtn = document.getElementById("topBtn");
    window.addEventListener("scroll", () => { topBtn.classList.toggle("show", window.scrollY > 300); });
    topBtn.addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }); });
  </script>

  <div class="cookie-banner" id="cookieBanner" role="dialog" aria-live="polite" aria-label="쿠키 사용 동의">

    <div class="cookie-btns">
      <button class="cookie-accept" id="cookieAccept">동의</button>
      <button class="cookie-decline" id="cookieDecline">거절</button>
    </div>
  </div>
  <script>
    (function(){var b=document.getElementById('cookieBanner');if(!b)return;if(localStorage.getItem('cookieConsent')){b.style.display='none';return;}b.style.display='flex';document.getElementById('cookieAccept').onclick=function(){localStorage.setItem('cookieConsent','accepted');b.style.display='none';};document.getElementById('cookieDecline').onclick=function(){localStorage.setItem('cookieConsent','declined');b.style.display='none';};})();
